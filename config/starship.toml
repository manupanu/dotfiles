add_newline = false
scan_timeout = 200
command_timeout = 1000

format = """
$directory\
$python\
$git_branch\
$git_status\
$character
"""

[directory]
style = "cyan blue"
truncation_length = 3
truncate_to_repo = true

[git_status]
style = "red"
format = '[$all_status$ahead_behind]($style) '

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
